name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout vbwd-fe-user
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          path: vbwd-fe-user
          submodules: recursive

      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-user/plugins/theme-switcher/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-user/package-lock.json

      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-user/vbwd-fe-core
          npm install
          npm run build

      - name: Install dependencies
        run: |
          cd vbwd-fe-user
          npm install

      - name: Run plugin tests
        run: |
          cd vbwd-fe-user
          if find plugins/theme-switcher -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            npx vitest run plugins/theme-switcher --reporter=verbose
          else
            echo "No tests found for theme-switcher — skipping."
          fi
