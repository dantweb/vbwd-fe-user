name: Plugin Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests — ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - chat
          - checkout
          - cms
          - ghrm
          - landing1
          - paypal-payment
          - stripe-payment
          - taro
          - theme-switcher
          - yookassa-payment

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-core
          npm install
          npm run build

      - name: Install dependencies
        run: npm install

      - name: Run plugin tests
        run: |
          if find plugins/${{ matrix.plugin }} -name "*.spec.ts" -o -name "*.test.ts" | grep -q .; then
            npx vitest run plugins/${{ matrix.plugin }} --reporter=verbose
          else
            echo "No tests for ${{ matrix.plugin }} — skipping."
          fi
